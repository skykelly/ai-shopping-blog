name: 🤖 Daily Article Pipeline

on:
  schedule:
    # 매일 한국 시간 오전 6시 (UTC 21:00 전날)
    - cron: "0 21 * * *"
  workflow_dispatch:  # Actions 탭에서 수동 실행 가능

permissions:
  contents: write   # git commit & push
  pages: write      # GitHub Pages 재배포
  id-token: write   # OIDC 인증

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 설정 ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 3. 파이프라인 실행 ───────────────────────────────────────
      - name: Run article pipeline
        env:
          # GitHub Models (GPT-4o mini) 접근용 PAT
          # → GitHub Secrets에 GH_MODELS_TOKEN 이름으로 등록 필요
          # → 자동 GITHUB_TOKEN은 GitHub Models API 접근 불가
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          # NewsAPI 무료 키 — GitHub Secrets에 NEWS_API_KEY로 등록
          # 없으면 Search Agent 건너뜀 (파이프라인은 정상 종료)
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python pipeline/coordinator.py

      # ── 4. 변경사항 커밋 & 푸시 ─────────────────────────────────
      - name: Commit & push if articles were added
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add articles-db-v2.json blog.html
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
            echo "ARTICLES_ADDED=false" >> $GITHUB_ENV
          else
            git commit -m "🤖 $(date +'%Y-%m-%d') 기사 자동 업데이트"
            git push
            echo "ARTICLES_ADDED=true" >> $GITHUB_ENV
          fi

      # ── 5. 변경 있을 때만 GitHub Pages 재배포 ───────────────────
      - name: Setup Pages
        if: env.ARTICLES_ADDED == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: env.ARTICLES_ADDED == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        if: env.ARTICLES_ADDED == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
